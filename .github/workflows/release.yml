name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release, for example v0.3.0
        required: true
        type: string
      publish:
        description: Publish to npm
        required: true
        default: true
        type: boolean

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, publish, and create release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Resolve release tag
        id: release-tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -u
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi

          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Release tag must look like v0.3.0; got '$tag'" >&2
              exit 1
              ;;
          esac

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.release-tag.outputs.tag }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Set up npm registry
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
          registry-url: https://registry.npmjs.org

      - name: Verify package version matches tag
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          set -u
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${RELEASE_TAG#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "package.json version ($package_version) does not match tag ($tag_version)" >&2
            exit 1
          fi

      - name: Run tests
        run: bun test

      - name: Build package
        run: bun run build

      - name: Pack package
        run: npm pack

      - name: Publish to npm
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
        run: npm publish --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          generate_release_notes: true
          files: ./*.tgz
