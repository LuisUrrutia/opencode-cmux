<svg width="719" height="276" viewBox="0 0 719 276" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">cmux sidebar preview</title>
  <desc id="desc">Dark cmux sidebar crop for Dotfiles showing three working OpenCode statuses, a finished bash log, a progress bar, prompt text, and git branch.</desc>
  <rect width="719" height="276" fill="#1C1B2A"/>
  <rect y="274" width="719" height="2" fill="#2B2A3D"/>

  <text x="18" y="45" fill="#E5E7EB" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700">Dotfiles</text>
  <text x="690" y="37" fill="#8C8A99" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400">×</text>

  <g transform="translate(20 68)" stroke="#31D3E6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="18" height="16" rx="3"/>
    <path d="M5 5l4 3-4 3"/>
    <path d="M11 11h4"/>
  </g>
  <text x="49" y="80" fill="#31D3E6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">working - 2 tools</text>

  <g transform="translate(20 98)" stroke="#F45B7A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="18" height="16" rx="3"/>
    <path d="M5 5l4 3-4 3"/>
    <path d="M11 11h4"/>
  </g>
  <text x="49" y="110" fill="#F45B7A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">working - 5 tools - 4 subagents</text>

  <g transform="translate(20 128)" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="18" height="16" rx="3"/>
    <path d="M5 5l4 3-4 3"/>
    <path d="M11 11h4"/>
  </g>
  <text x="49" y="140" fill="#F59E0B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">working - 4 tools - 1 subagent</text>

  <circle cx="25" cy="170" r="3.5" fill="#8A8898"/>
  <text x="42" y="174" fill="#B5B3C0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500">.dotfiles: finished bash</text>

  <rect x="18" y="188" width="690" height="6" rx="3" fill="#4A4858"/>
  <rect x="18" y="188" width="537" height="6" rx="3" fill="#3B82F6"/>

  <text x="18" y="216" fill="#A7A5B4" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500">.dotfiles: Dotfiles ideas and tool recommendations</text>
  <text x="18" y="248" fill="#D7D5E0" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="15" font-weight="500">main* • ~/.dotfiles</text>
</svg>
